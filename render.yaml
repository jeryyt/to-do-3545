services:
  # Backend API Service
  - type: web
    name: todo-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true

  # Frontend React Service  
  - type: web
    name: todo-client
    env: node
    region: oregon
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npx serve -s build -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true